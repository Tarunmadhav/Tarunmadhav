name: Update profile art

# Scrapes Tarun's real contribution data daily and re-renders the animated
# heatmap SVG. Portrait and info card are static; only the heatmap changes.

on:
  schedule:
    - cron: "17 6 * * *"   # 06:17 UTC every day (~11:47 AM IST)
  workflow_dispatch: {}      # run manually from the Actions tab anytime
  push:
    branches: [main]

permissions:
  contents: write            # needed to commit the refreshed SVG back

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape live contribution data (no token needed)
        run: python scripts/fetch_contributions.py
        env:
          GH_PROFILE_USER: Tarunmadhav

      - name: Render animated contribution graph SVG
        run: python scripts/render_heatmap_svg.py

      - name: Commit refreshed art
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh contribution graph [skip ci]"
          file_pattern: "data/contributions.json contrib-heatmap.svg"
